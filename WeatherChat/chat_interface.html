<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather Chatbot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
    html, body { height: 100%; margin: 0; }
    .chat-container { height: 100vh; display: flex; flex-direction: column; }
    .messages { flex: 1; overflow-y: auto; padding: 1rem; }
    .input-area { padding: 1rem; border-t: 1px solid #e5e7eb; background: white; }
    .message { max-width: 80%; padding: 0.75rem 1rem; border-radius: 1rem; margin-bottom: 0.5rem; }
    .message-user { background: #3b82f6; color: white; margin-left: auto; border-bottom-right-radius: 0.25rem; }
    .message-bot { background: #f3f4f6; color: #1f2937; margin-right: auto; border-bottom-left-radius: 0.25rem; }
    .typing { display: none; padding: 0.75rem 1rem; border-radius: 1rem; background: #f3f4f6; margin-bottom: 0.5rem; }
    .typing.active { display: block; }
    .typing span { display: inline-block; width: 8px; height: 8px; background: #9ca3af; border-radius: 50%; margin: 0 2px; animation: bounce 1.4s infinite ease-in-out; }
    .typing span:nth-child(1) { animation-delay: -0.32s; }
    .typing span:nth-child(2) { animation-delay: -0.16s; }
    @keyframes bounce { 0%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-8px); } }
  </style>
</head>
<body>
  <div class="chat-container max-w-2xl mx-auto shadow-xl">
    <!-- Header -->
    <header class="bg-blue-600 text-white px-4 py-3 flex items-center gap-3">
      <div class="text-2xl">🌤️</div>
      <div>
        <h1 class="font-semibold text-lg">Weather Chatbot</h1>
        <p class="text-xs text-blue-200">Ask me about any city's weather</p>
      </div>
    </header>

    <!-- Messages -->
    <div class="messages" id="messages">
      <div class="message message-bot">
        Hi! I'm your weather assistant. Ask me something like:<br>
        • "What's the weather in London?"<br>
        • "Is it raining in Tokyo?"<br>
        • "Tell me the weather in New York"
      </div>
      <div class="typing" id="typing">
        <span></span><span></span><span></span>
      </div>
    </div>

    <!-- Input -->
    <div class="input-area">
      <form id="chatForm" class="flex gap-2">
        <input
          type="text"
          id="userInput"
          placeholder="Type your message..."
          class="flex-1 px-4 py-3 border border-gray-300 rounded-full outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200"
          autocomplete="off"
        />
        <button
          type="submit"
          class="px-6 py-3 bg-blue-600 text-white rounded-full font-medium hover:bg-blue-700 transition disabled:opacity-50"
          id="sendBtn"
        >
          Send
        </button>
      </form>
    </div>
  </div>

  <script>
    // === CONFIGURE YOUR WEBHOOK URL HERE ===
    const WEBHOOK_URL = "https://srv1601018.hstgr.cloud/webhook/weather-chat";
    // ========================================

    const messagesDiv = document.getElementById('messages');
    const typingDiv = document.getElementById('typing');
    const chatForm = document.getElementById('chatForm');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');

    function addMessage(text, isUser) {
      const div = document.createElement('div');
      div.className = `message ${isUser ? 'message-user' : 'message-bot'}`;
      div.innerHTML = text.replace(/\n/g, '<br>');
      messagesDiv.insertBefore(div, typingDiv);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    async function sendMessage() {
      const text = userInput.value.trim();
      if (!text) return;

      // Disable input while sending
      userInput.disabled = true;
      sendBtn.disabled = true;

      // Add user message
      addMessage(text, true);
      userInput.value = '';

      // Show typing indicator
      typingDiv.classList.add('active');
      messagesDiv.scrollTop = messagesDiv.scrollHeight;

      try {
        const response = await fetch(WEBHOOK_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text })
        });

        typingDiv.classList.remove('active');

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();

        if (data.status === 'success') {
          addMessage(data.reply, false);
        } else {
          addMessage(data.reply || 'Sorry, something went wrong. Please try again.', false);
        }
      } catch (error) {
        typingDiv.classList.remove('active');
        addMessage(`❌ Error: ${error.message}. Make sure n8n is running and the webhook is active.`, false);
      } finally {
        userInput.disabled = false;
        sendBtn.disabled = false;
        userInput.focus();
      }
    }

    chatForm.addEventListener('submit', (e) => {
      e.preventDefault();
      sendMessage();
    });

    // Focus input on load
    userInput.focus();
  </script>
</body>
</html>
