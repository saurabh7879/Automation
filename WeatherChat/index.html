<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather Chatbot</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .chat-container {
      width: 420px;
      max-width: 95vw;
      height: 700px;
      background: #fff;
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }

    /* ── Header ── */
    .chat-header {
      background: linear-gradient(135deg, #667eea, #764ba2);
      padding: 18px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .chat-header .avatar {
      width: 40px; height: 40px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }

    .chat-header .info h2 { color: #fff; font-size: 15px; font-weight: 600; }
    .chat-header .info p  { color: rgba(255,255,255,0.75); font-size: 12px; }

    .status-dot {
      width: 8px; height: 8px;
      background: #4ade80;
      border-radius: 50%;
      display: inline-block;
      margin-right: 5px;
    }

    /* ── Quote of the Day ── */
    .quote-bar {
      background: linear-gradient(135deg, #f5f3ff, #ede9fe);
      padding: 10px 16px;
      border-bottom: 1px solid #ddd6fe;
      display: flex;
      align-items: flex-start;
      gap: 8px;
      flex-shrink: 0;
    }

    .quote-icon { font-size: 15px; flex-shrink: 0; margin-top: 2px; }

    .quote-label {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #7c3aed;
      margin-bottom: 3px;
    }

    .quote-text {
      font-size: 11.5px;
      color: #4b5563;
      line-height: 1.5;
      font-style: italic;
    }

    /* ── Messages ── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: #f8f9fb;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 2px; }

    .message {
      display: flex;
      flex-direction: column;
      max-width: 88%;
      animation: fadeIn 0.2s ease-in;
    }

    @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }

    .message.user { align-self: flex-end; align-items: flex-end; }
    .message.bot  { align-self: flex-start; align-items: flex-start; }

    .bubble {
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.5;
    }

    .message.user .bubble {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .message.bot .bubble {
      background: #fff;
      color: #1f2937;
      border-bottom-left-radius: 4px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .timestamp { font-size: 10px; color: #9ca3af; margin-top: 3px; }

    /* ── Weather Card ── */
    .weather-card {
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 16px rgba(0,0,0,0.18);
      min-width: 260px;
      max-width: 300px;
    }

    .wc-top {
      padding: 18px 16px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #fff;
      position: relative;
    }

    .wc-top img {
      width: 60px; height: 60px;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,0.25));
      flex-shrink: 0;
    }

    .wc-meta { flex: 1; }
    .wc-city    { font-size: 16px; font-weight: 700; line-height: 1.2; }
    .wc-country { font-size: 11px; opacity: 0.8; margin-bottom: 2px; }
    .wc-cond    { font-size: 12px; opacity: 0.9; text-transform: capitalize; }
    .wc-temp    { font-size: 32px; font-weight: 800; letter-spacing: -1px; }

    .wc-bottom {
      background: #fff;
      padding: 12px 15px;
      font-size: 13px;
      color: #374151;
      line-height: 1.6;
      border-top: 1px solid rgba(0,0,0,0.06);
    }

    /* Condition gradients */
    .cond-clear        { background: linear-gradient(135deg, #f7971e, #ffd200); }
    .cond-clouds       { background: linear-gradient(135deg, #636fa4, #e8cbf0); }
    .cond-rain         { background: linear-gradient(135deg, #1e3c72, #2a5298); }
    .cond-drizzle      { background: linear-gradient(135deg, #4facfe, #00f2fe); }
    .cond-thunderstorm { background: linear-gradient(135deg, #232526, #414345); }
    .cond-snow         { background: linear-gradient(135deg, #83a4d4, #b6fbff); }
    .cond-atmosphere   { background: linear-gradient(135deg, #8e9eab, #eef2f3); }

    /* ── Typing indicator ── */
    .typing-bubble {
      display: flex; align-items: center; gap: 4px;
      padding: 12px 16px;
      background: #fff;
      border-radius: 16px;
      border-bottom-left-radius: 4px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .typing-bubble span {
      width: 7px; height: 7px;
      background: #9ca3af;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing-bubble span:nth-child(2) { animation-delay: 0.2s; }
    .typing-bubble span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce { 0%,60%,100% { transform:translateY(0); } 30% { transform:translateY(-6px); } }

    /* ── Input ── */
    .input-area {
      padding: 14px 16px;
      background: #fff;
      border-top: 1px solid #e5e7eb;
      display: flex; gap: 10px; align-items: flex-end;
      flex-shrink: 0;
    }

    #userInput {
      flex: 1;
      border: 1.5px solid #e5e7eb;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      outline: none;
      transition: border-color 0.2s;
      max-height: 100px;
    }

    #userInput:focus { border-color: #667eea; }

    #sendBtn {
      width: 42px; height: 42px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: opacity 0.2s, transform 0.1s;
      flex-shrink: 0;
    }

    #sendBtn:hover  { opacity: 0.88; }
    #sendBtn:active { transform: scale(0.95); }
    #sendBtn:disabled { opacity: 0.4; cursor: not-allowed; }
    #sendBtn svg { fill: #fff; }
  </style>
</head>
<body>

<div class="chat-container">

  <div class="chat-header">
    <div class="avatar">⛅</div>
    <div class="info">
      <h2>Weather Assistant</h2>
      <p><span class="status-dot"></span>Powered by Gemini AI</p>
    </div>
  </div>

  <div class="quote-bar">
    <div class="quote-icon">💬</div>
    <div>
      <div class="quote-label">Quote of the Day</div>
      <div class="quote-text" id="dailyQuote"></div>
    </div>
  </div>

  <div class="messages" id="messages">
    <div class="message bot">
      <div class="bubble">
        Hi! I'm your weather assistant. Ask me about the weather anywhere in the world — for example:<br><br>
        <em>"What's the weather in Tokyo?"</em><br>
        <em>"Is it raining in Mumbai right now?"</em>
      </div>
      <span class="timestamp">Just now</span>
    </div>
  </div>

  <div class="input-area">
    <textarea id="userInput" rows="1" placeholder="Ask about weather in any city..."></textarea>
    <button id="sendBtn" onclick="sendMessage()">
      <svg width="18" height="18" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>

</div>

<script>
  const WEBHOOK_URL = "https://n8n.framegenai.cloud/webhook/weather-chat";

  const QUOTES = [
    "Wherever you go, no matter what the weather, always bring your own sunshine. — Anthony J. D'Angelo",
    "Climate is what we expect, weather is what we get. — Mark Twain",
    "Sunshine is delicious, rain is refreshing — there is really no such thing as bad weather. — John Ruskin",
    "Into each life some rain must fall. — Henry Wadsworth Longfellow",
    "Some people feel the rain. Others just get wet. — Bob Marley",
    "Life isn't about waiting for the storm to pass. It's about learning to dance in the rain. — Vivian Greene",
    "After every storm the sun will smile. — William George Jordan",
    "The sun always shines above the clouds. — Paul F. Davis",
    "Rain is grace; without rain, there would be no life. — John Updike",
    "Every storm runs out of rain. — Gary Allan",
    "The best thing to do when it's raining is to let it rain. — Longfellow",
    "A change in the weather is enough to recreate the world. — Marcel Proust",
    "No weather is ill if the wind be still. — English Proverb",
    "There is no bad weather, only inappropriate clothing. — Sir Ranulph Fiennes",
    "The coldest winter I ever spent was a summer in San Francisco. — Mark Twain",
    "April showers bring May flowers. — English Proverb",
    "Prepare for the storm so you can enjoy the calm. — Unknown",
    "Even the darkest cloud has a silver lining. — English Proverb",
    "The sun will rise and we will try again. — Twenty One Pilots",
    "Storms make trees take deeper roots. — Dolly Parton",
  ];

  const CONDITION_MAP = {
    clear:        "cond-clear",
    clouds:       "cond-clouds",
    rain:         "cond-rain",
    drizzle:      "cond-drizzle",
    thunderstorm: "cond-thunderstorm",
    snow:         "cond-snow",
    mist:         "cond-atmosphere",
    smoke:        "cond-atmosphere",
    haze:         "cond-atmosphere",
    dust:         "cond-atmosphere",
    fog:          "cond-atmosphere",
    sand:         "cond-atmosphere",
    ash:          "cond-atmosphere",
    squall:       "cond-atmosphere",
    tornado:      "cond-atmosphere",
  };

  document.getElementById("dailyQuote").textContent =
    QUOTES[new Date().getDate() % QUOTES.length];

  const messagesEl = document.getElementById("messages");
  const inputEl    = document.getElementById("userInput");
  const sendBtn    = document.getElementById("sendBtn");

  function getTime() {
    return new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
  }

  function addPlainMessage(text, role) {
    const div = document.createElement("div");
    div.className = `message ${role}`;
    div.innerHTML = `<div class="bubble">${text}</div><span class="timestamp">${getTime()}</span>`;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function addWeatherCard(data) {
    const condKey   = (data.condition || "").toLowerCase();
    const gradClass = CONDITION_MAP[condKey] || "cond-clouds";
    const iconUrl   = `https://openweathermap.org/img/wn/${data.icon}@2x.png`;
    const temp      = Math.round(data.temp);
    const reply     = (data.reply || "").replace(/\n/g, "<br>");

    const div = document.createElement("div");
    div.className = "message bot";
    div.innerHTML = `
      <div class="weather-card">
        <div class="wc-top ${gradClass}">
          <img src="${iconUrl}" alt="${data.condition}" onerror="this.style.display='none'">
          <div class="wc-meta">
            <div class="wc-city">${data.city}</div>
            <div class="wc-country">${data.country}</div>
            <div class="wc-cond">${data.condition}</div>
          </div>
          <div class="wc-temp">${temp}°C</div>
        </div>
        <div class="wc-bottom">${reply}</div>
      </div>
      <span class="timestamp">${getTime()}</span>
    `;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function showTyping() {
    const div = document.createElement("div");
    div.className = "message bot";
    div.id = "typing";
    div.innerHTML = `<div class="typing-bubble"><span></span><span></span><span></span></div>`;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById("typing");
    if (el) el.remove();
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;

    inputEl.value = "";
    inputEl.style.height = "auto";
    sendBtn.disabled = true;

    addPlainMessage(text, "user");
    showTyping();

    try {
      const res  = await fetch(WEBHOOK_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text }),
      });
      const data = await res.json();
      removeTyping();

      if (data.status === "success" && data.icon) {
        addWeatherCard(data);
      } else {
        addPlainMessage(data.reply || "Sorry, I couldn't get weather data right now.", "bot");
      }
    } catch (err) {
      removeTyping();
      addPlainMessage("Connection error. Make sure your n8n workflow is active.", "bot");
      console.error(err);
    } finally {
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }

  inputEl.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  inputEl.addEventListener("input", () => {
    inputEl.style.height = "auto";
    inputEl.style.height = Math.min(inputEl.scrollHeight, 100) + "px";
  });
</script>

</body>
</html>
