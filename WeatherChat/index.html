<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skycast — Beautiful Weather</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
    html, body, #root { height: 100%; margin: 0; }
    body { overflow-x: hidden; }
    .glass {
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.18);
    }
    .glass-dark {
      background: rgba(0, 0, 0, 0.25);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    @keyframes pulse-slow {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }
    .fade-up { animation: fadeUp 0.6s ease-out forwards; }
    .float { animation: float 4s ease-in-out infinite; }
    .pulse-slow { animation: pulse-slow 3s ease-in-out infinite; }
    .bg-transition { transition: background 1.2s ease-in-out; }
    .temp-display {
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.04em;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // API settings will be fetched from the backend
    const N8N_WEBHOOK_URL = "https://srv1601018.hstgr.cloud/webhook/get-weather-config"; // Your n8n config webhook
    const BASE = "https://api.openweathermap.org/data/2.5";
    const GEO = "https://api.openweathermap.org/geo/1.0";

    // Weather-condition-driven backgrounds
    const gradients = {
      clear_day:    "linear-gradient(135deg, #2E86FF 0%, #6BB6FF 50%, #A5D8FF 100%)",
      clear_night:  "linear-gradient(135deg, #0F2027 0%, #203A43 50%, #2C5364 100%)",
      clouds_day:   "linear-gradient(135deg, #4B6CB7 0%, #8AA4D6 100%)",
      clouds_night: "linear-gradient(135deg, #1F2937 0%, #3B4A63 100%)",
      rain_day:     "linear-gradient(135deg, #3A6073 0%, #16222A 100%)",
      rain_night:   "linear-gradient(135deg, #0B1622 0%, #1C2E3E 100%)",
      thunder:      "linear-gradient(135deg, #1A1A2E 0%, #16213E 50%, #0F3460 100%)",
      snow:         "linear-gradient(135deg, #8EA9C1 0%, #C9D6E8 50%, #E0EAF5 100%)",
      mist:         "linear-gradient(135deg, #606c88 0%, #3f4c6b 100%)",
      default:      "linear-gradient(135deg, #2E86FF 0%, #6BB6FF 100%)",
    };

    function pickGradient(main, isDay) {
      const m = (main || "").toLowerCase();
      if (m === "clear") return isDay ? gradients.clear_day : gradients.clear_night;
      if (m === "clouds") return isDay ? gradients.clouds_day : gradients.clouds_night;
      if (m === "rain" || m === "drizzle") return isDay ? gradients.rain_day : gradients.rain_night;
      if (m === "thunderstorm") return gradients.thunder;
      if (m === "snow") return gradients.snow;
      if (["mist","fog","haze","smoke","dust","sand","ash"].includes(m)) return gradients.mist;
      return gradients.default;
    }

    function weatherEmoji(main, isDay) {
      const m = (main || "").toLowerCase();
      if (m === "clear") return isDay ? "☀️" : "🌙";
      if (m === "clouds") return isDay ? "⛅" : "☁️";
      if (m === "rain") return "🌧️";
      if (m === "drizzle") return "🌦️";
      if (m === "thunderstorm") return "⛈️";
      if (m === "snow") return "❄️";
      if (["mist","fog","haze"].includes(m)) return "🌫️";
      return "🌤️";
    }

    function formatTime(ts, tzOffset) {
      const d = new Date((ts + tzOffset) * 1000);
      return d.toUTCString().match(/\d\d:\d\d/)[0];
    }

    function formatHour(ts, tzOffset) {
      const d = new Date((ts + tzOffset) * 1000);
      const h = d.getUTCHours();
      const suffix = h >= 12 ? "PM" : "AM";
      const hr = ((h + 11) % 12) + 1;
      return `${hr} ${suffix}`;
    }

    function formatDay(ts, tzOffset) {
      const d = new Date((ts + tzOffset) * 1000);
      return ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][d.getUTCDay()];
    }

    // Icon components (inline SVG, stroke-based)
    const Icon = {
      Search: () => (
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      ),
      MapPin: () => (
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/>
        </svg>
      ),
      Wind: () => (
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <path d="M17.7 7.7a2.5 2.5 0 1 1 1.8 4.3H2"/><path d="M9.6 4.6A2 2 0 1 1 11 8H2"/><path d="M12.6 19.4A2 2 0 1 0 14 16H2"/>
        </svg>
      ),
      Droplets: () => (
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <path d="M7 16.3c2.2 0 4-1.83 4-4.05 0-1.16-.57-2.26-1.71-3.19S7.29 6.75 7 5.3c-.29 1.45-1.14 2.84-2.29 3.76S3 11.1 3 12.25c0 2.22 1.8 4.05 4 4.05z"/><path d="M12.56 6.6A10.97 10.97 0 0 0 14 3.02c.5 2.5 2 4.9 4 6.5s3 3.5 3 5.5a6.98 6.98 0 0 1-11.91 4.97"/>
        </svg>
      ),
      Thermometer: () => (
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <path d="M14 14.76V3.5a2.5 2.5 0 0 0-5 0v11.26a4 4 0 1 0 5 0z"/>
        </svg>
      ),
      Gauge: () => (
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <path d="M12 14l4-4"/><path d="M3.34 19a10 10 0 1 1 17.32 0"/>
        </svg>
      ),
      Eye: () => (
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
        </svg>
      ),
      Sunrise: () => (
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <path d="M17 18a5 5 0 0 0-10 0"/><line x1="12" y1="2" x2="12" y2="9"/><line x1="4.22" y1="10.22" x2="5.64" y2="11.64"/><line x1="1" y1="18" x2="3" y2="18"/><line x1="21" y1="18" x2="23" y2="18"/><line x1="18.36" y1="11.64" x2="19.78" y2="10.22"/><line x1="23" y1="22" x2="1" y2="22"/><polyline points="8 6 12 2 16 6"/>
        </svg>
      ),
      Sunset: () => (
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <path d="M17 18a5 5 0 0 0-10 0"/><line x1="12" y1="9" x2="12" y2="2"/><line x1="4.22" y1="10.22" x2="5.64" y2="11.64"/><line x1="1" y1="18" x2="3" y2="18"/><line x1="21" y1="18" x2="23" y2="18"/><line x1="18.36" y1="11.64" x2="19.78" y2="10.22"/><line x1="23" y1="22" x2="1" y2="22"/><polyline points="16 5 12 9 8 5"/>
        </svg>
      ),
      Locate: () => (
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/><line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/><circle cx="12" cy="12" r="7"/><circle cx="12" cy="12" r="3"/>
        </svg>
      ),
    };

    function StatCard({ icon, label, value, sub }) {
      return (
        <div className="glass rounded-3xl p-4 md:p-5 text-white shadow-xl fade-up">
          <div className="flex items-center gap-2 text-white/80 text-xs md:text-sm font-medium">
            <span className="opacity-90">{icon}</span>
            <span className="uppercase tracking-wider">{label}</span>
          </div>
          <div className="mt-2 text-2xl md:text-3xl font-bold temp-display">{value}</div>
          {sub && <div className="text-xs md:text-sm text-white/70 mt-1">{sub}</div>}
        </div>
      );
    }

    function App() {
      const [apiKey, setApiKey] = useState(null);
      const [query, setQuery] = useState("");
      const [suggestions, setSuggestions] = useState([]);
      const [weather, setWeather] = useState(null);
      const [forecast, setForecast] = useState(null);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState("");
      const [unit, setUnit] = useState("metric"); // metric | imperial
      const [bg, setBg] = useState(gradients.default);
      const searchRef = useRef(null);

      const unitSymbol = unit === "metric" ? "°C" : "°F";
      const windUnit = unit === "metric" ? "m/s" : "mph";

      async function fetchByCoords(lat, lon) {
        if (!apiKey) return;
        try {
          setLoading(true);
          setError("");
          const [wRes, fRes] = await Promise.all([
            fetch(`${BASE}/weather?lat=${lat}&lon=${lon}&units=${unit}&appid=${apiKey}`),
            fetch(`${BASE}/forecast?lat=${lat}&lon=${lon}&units=${unit}&appid=${apiKey}`),
          ]);
          if (!wRes.ok) throw new Error(`Weather API error (${wRes.status})`);
          if (!fRes.ok) throw new Error(`Forecast API error (${fRes.status})`);
          const w = await wRes.json();
          const f = await fRes.json();
          setWeather(w);
          setForecast(f);
          const isDay = w.dt > w.sys.sunrise && w.dt < w.sys.sunset;
          setBg(pickGradient(w.weather?.[0]?.main, isDay));
        } catch (e) {
          setError(e.message || "Failed to load weather");
        } finally {
          setLoading(false);
        }
      }

      async function searchCity(name) {
        if (!name.trim() || !apiKey) return;
        try {
          const res = await fetch(`${GEO}/direct?q=${encodeURIComponent(name)}&limit=1&appid=${apiKey}`);
          const list = await res.json();
          if (!list.length) { setError("City not found. Try another name."); return; }
          const c = list[0];
          setQuery("");
          setSuggestions([]);
          fetchByCoords(c.lat, c.lon);
        } catch {
          setError("Search failed. Check connection.");
        }
      }

      async function handleInput(val) {
        setQuery(val);
        if (val.length < 2 || !apiKey) { setSuggestions([]); return; }
        try {
          const res = await fetch(`${GEO}/direct?q=${encodeURIComponent(val)}&limit=5&appid=${apiKey}`);
          const list = await res.json();
          setSuggestions(list || []);
        } catch {}
      }

      function useMyLocation() {
        if (!apiKey) { setError("API key not loaded."); return; }
        if (!navigator.geolocation) { setError("Geolocation not available"); return; }
        navigator.geolocation.getCurrentPosition(
          (pos) => fetchByCoords(pos.coords.latitude, pos.coords.longitude),
          () => fetchByCoords(19.0760, 72.8777) // Mumbai default
        );
      }

      // Fetch API Key from n8n backend on initial load
      useEffect(() => {
        async function fetchConfig() {
          try {
            const res = await fetch(N8N_WEBHOOK_URL);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const config = await res.json();
            if (config.apiKey) {
              setApiKey(config.apiKey);
            } else {
              setError("Could not load API configuration from backend.");
            }
          } catch(e) {
            setError(`Failed to connect to config service: ${e.message}. Ensure n8n is running.`);
          }
        }
        fetchConfig();
      }, []);

      // Once API key is loaded, fetch initial weather data
      useEffect(() => {
        if (apiKey) {
          useMyLocation();
        }
      }, [apiKey]);

      // Refetch data when units change
      useEffect(() => {
        if (weather) fetchByCoords(weather.coord.lat, weather.coord.lon);
      }, [unit]);

      // Group 3-hour forecast into daily buckets
      function dailyForecast() {
        if (!forecast) return [];
        const days = {};
        forecast.list.forEach(item => {
          const d = new Date((item.dt + forecast.city.timezone) * 1000);
          const key = d.toUTCString().slice(0, 11);
          if (!days[key]) days[key] = { items: [], ts: item.dt };
          days[key].items.push(item);
        });
        return Object.entries(days).slice(0, 5).map(([k, v]) => {
          const temps = v.items.map(i => i.main.temp);
          const icons = v.items.map(i => i.weather[0].main);
          const midday = v.items.find(i => {
            const h = new Date((i.dt + forecast.city.timezone) * 1000).getUTCHours();
            return h >= 12 && h <= 15;
          }) || v.items[0];
          return {
            ts: v.ts,
            main: midday.weather[0].main,
            max: Math.max(...temps),
            min: Math.min(...temps),
          };
        });
      }

      return (
        <div className="min-h-screen bg-transition" style={{ background: bg }}>
          <div className="min-h-screen backdrop-blur-[0.5px] bg-black/5">
            <div className="max-w-6xl mx-auto px-4 md:px-6 py-6 md:py-10">

              {/* Header */}
              <header className="flex items-center justify-between mb-6 md:mb-10">
                <div className="flex items-center gap-2 text-white">
                  <div className="text-2xl md:text-3xl">🌤️</div>
                  <div className="font-extrabold text-xl md:text-2xl tracking-tight">Skycast</div>
                </div>
                <div className="flex items-center gap-2">
                  <button
                    onClick={useMyLocation}
                    className="glass rounded-full p-2.5 text-white hover:bg-white/20 transition"
                    title="Use my location"
                  >
                    <Icon.Locate />
                  </button>
                  <div className="glass rounded-full p-1 flex text-white text-sm font-semibold">
                    <button
                      onClick={() => setUnit("metric")}
                      className={`px-3 py-1.5 rounded-full transition ${unit === "metric" ? "bg-white text-slate-800" : ""}`}
                    >°C</button>
                    <button
                      onClick={() => setUnit("imperial")}
                      className={`px-3 py-1.5 rounded-full transition ${unit === "imperial" ? "bg-white text-slate-800" : ""}`}
                    >°F</button>
                  </div>
                </div>
              </header>

              {/* Search */}
              <div className="relative mb-6 md:mb-10 max-w-xl">
                <div className="glass rounded-2xl flex items-center px-4 py-3 text-white shadow-xl">
                  <span className="text-white/80"><Icon.Search /></span>
                  <input
                    ref={searchRef}
                    value={query}
                    onChange={(e) => handleInput(e.target.value)}
                    onKeyDown={(e) => e.key === "Enter" && searchCity(query)}
                    placeholder={apiKey ? "Search any city..." : "Loading configuration..."}
                    className="bg-transparent outline-none flex-1 ml-3 placeholder-white/60 text-base"
                    disabled={!apiKey}
                  />
                  {query && (
                    <button onClick={() => { setQuery(""); setSuggestions([]); }} className="text-white/70 text-sm">✕</button>
                  )}
                </div>
                {suggestions.length > 0 && (
                  <div className="absolute z-20 mt-2 w-full glass-dark rounded-2xl overflow-hidden shadow-2xl">
                    {suggestions.map((s, i) => (
                      <button
                        key={i}
                        onClick={() => searchCity(`${s.name},${s.country}`)}
                        className="w-full text-left px-4 py-3 text-white hover:bg-white/10 transition flex items-center gap-2"
                      >
                        <Icon.MapPin />
                        <span>{s.name}{s.state ? `, ${s.state}` : ""}, {s.country}</span>
                      </button>
                    ))}
                  </div>
                )}
              </div>

              {error && (
                <div className="glass-dark text-white px-5 py-4 rounded-2xl mb-6 flex items-center gap-3">
                  <span className="text-2xl">⚠️</span>
                  <span>{error}</span>
                </div>
              )}

              {loading && !weather && (
                <div className="flex flex-col items-center justify-center py-32 text-white">
                  <div className="text-6xl float">☁️</div>
                  <div className="mt-4 pulse-slow text-lg font-medium">Loading weather...</div>
                </div>
              )}

              {weather && (
                <>
                  {/* Hero */}
                  <section className="grid grid-cols-1 lg:grid-cols-3 gap-4 md:gap-6 mb-6">
                    <div className="lg:col-span-2 glass rounded-3xl p-6 md:p-8 text-white fade-up">
                      <div className="flex items-center gap-2 text-white/80 text-sm font-medium">
                        <Icon.MapPin />
                        <span>{weather.name}, {weather.sys.country}</span>
                      </div>
                      <div className="mt-4 flex items-end gap-6">
                        <div className="text-8xl md:text-9xl float leading-none">
                          {weatherEmoji(weather.weather[0].main, weather.dt > weather.sys.sunrise && weather.dt < weather.sys.sunset)}
                        </div>
                        <div>
                          <div className="text-7xl md:text-8xl font-black temp-display leading-none">
                            {Math.round(weather.main.temp)}<span className="text-5xl md:text-6xl font-bold text-white/80">{unitSymbol}</span>
                          </div>
                          <div className="mt-3 text-xl md:text-2xl font-semibold capitalize">
                            {weather.weather[0].description}
                          </div>
                          <div className="mt-1 text-sm md:text-base text-white/80">
                            Feels like {Math.round(weather.main.feels_like)}{unitSymbol} • H {Math.round(weather.main.temp_max)}° L {Math.round(weather.main.temp_min)}°
                          </div>
                        </div>
                      </div>
                    </div>

                    <div className="glass rounded-3xl p-6 text-white fade-up">
                      <div className="text-white/80 text-xs uppercase tracking-wider font-semibold">Sunrise & Sunset</div>
                      <div className="mt-5 flex items-center justify-between">
                        <div className="flex flex-col items-center">
                          <Icon.Sunrise />
                          <div className="mt-2 text-2xl font-bold">{formatTime(weather.sys.sunrise, weather.timezone)}</div>
                          <div className="text-xs text-white/70 mt-1">Sunrise</div>
                        </div>
                        <div className="flex-1 mx-4 h-px bg-white/20 relative">
                          <div className="absolute -top-1 left-1/2 -translate-x-1/2 w-2 h-2 rounded-full bg-yellow-300 pulse-slow"></div>
                        </div>
                        <div className="flex flex-col items-center">
                          <Icon.Sunset />
                          <div className="mt-2 text-2xl font-bold">{formatTime(weather.sys.sunset, weather.timezone)}</div>
                          <div className="text-xs text-white/70 mt-1">Sunset</div>
                        </div>
                      </div>
                      <div className="mt-6 pt-5 border-t border-white/15">
                        <div className="text-white/80 text-xs uppercase tracking-wider font-semibold">Local Time</div>
                        <div className="mt-2 text-3xl font-bold temp-display">
                          {formatTime(weather.dt, weather.timezone)}
                        </div>
                      </div>
                    </div>
                  </section>

                  {/* Stats grid */}
                  <section className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-3 md:gap-4 mb-6">
                    <StatCard icon={<Icon.Thermometer />} label="Feels Like" value={`${Math.round(weather.main.feels_like)}${unitSymbol}`} />
                    <StatCard icon={<Icon.Droplets />} label="Humidity" value={`${weather.main.humidity}%`} />
                    <StatCard icon={<Icon.Wind />} label="Wind" value={`${Math.round(weather.wind.speed)} ${windUnit}`} sub={`${weather.wind.deg}°`} />
                    <StatCard icon={<Icon.Gauge />} label="Pressure" value={`${weather.main.pressure}`} sub="hPa" />
                    <StatCard icon={<Icon.Eye />} label="Visibility" value={`${(weather.visibility / 1000).toFixed(1)}`} sub="km" />
                    <StatCard icon={<span>☁️</span>} label="Cloudiness" value={`${weather.clouds.all}%`} />
                  </section>

                  {/* Hourly (next ~24h, 3h steps) */}
                  {forecast && (
                    <section className="glass rounded-3xl p-5 md:p-6 text-white mb-6 fade-up">
                      <div className="text-white/80 text-xs uppercase tracking-wider font-semibold mb-4">Next 24 Hours</div>
                      <div className="flex gap-3 overflow-x-auto scrollbar-hide pb-2">
                        {forecast.list.slice(0, 8).map((h, i) => {
                          const isDay = (h.sys?.pod || "d") === "d";
                          return (
                            <div key={i} className="flex-shrink-0 w-24 md:w-28 flex flex-col items-center bg-white/10 rounded-2xl p-3 border border-white/10">
                              <div className="text-sm font-medium text-white/80">{formatHour(h.dt, forecast.city.timezone)}</div>
                              <div className="text-3xl my-2">{weatherEmoji(h.weather[0].main, isDay)}</div>
                              <div className="text-xl font-bold temp-display">{Math.round(h.main.temp)}°</div>
                              <div className="text-xs text-white/70 mt-1">💧 {h.main.humidity}%</div>
                            </div>
                          );
                        })}
                      </div>
                    </section>
                  )}

                  {/* 5-day forecast */}
                  {forecast && (
                    <section className="glass rounded-3xl p-5 md:p-6 text-white fade-up">
                      <div className="text-white/80 text-xs uppercase tracking-wider font-semibold mb-4">5-Day Forecast</div>
                      <div className="divide-y divide-white/10">
                        {dailyForecast().map((d, i) => (
                          <div key={i} className="flex items-center justify-between py-3 md:py-4">
                            <div className="w-16 md:w-24 font-semibold text-base md:text-lg">
                              {i === 0 ? "Today" : formatDay(d.ts, forecast.city.timezone)}
                            </div>
                            <div className="text-3xl md:text-4xl w-12 text-center">
                              {weatherEmoji(d.main, true)}
                            </div>
                            <div className="flex-1 mx-4 md:mx-6 text-sm text-white/80 capitalize">
                              {d.main}
                            </div>
                            <div className="flex items-center gap-3 md:gap-4 text-base md:text-lg temp-display font-semibold">
                              <span className="text-white/70">{Math.round(d.min)}°</span>
                              <div className="w-16 md:w-24 h-1.5 rounded-full bg-white/20 overflow-hidden">
                                <div className="h-full bg-gradient-to-r from-blue-300 to-orange-300 rounded-full" style={{ width: "100%" }}></div>
                              </div>
                              <span>{Math.round(d.max)}°</span>
                            </div>
                          </div>
                        ))}
                      </div>
                    </section>
                  )}

                  <footer className="mt-8 text-center text-white/60 text-xs md:text-sm">
                    Weather data by OpenWeatherMap • Made with ☕ & React
                  </footer>
                </>
              )}
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
