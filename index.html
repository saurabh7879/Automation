<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather Chatbot</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .chat-container {
      width: 420px;
      max-width: 95vw;
      height: 620px;
      background: #fff;
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }

    .chat-header {
      background: linear-gradient(135deg, #667eea, #764ba2);
      padding: 18px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .chat-header .avatar {
      width: 40px;
      height: 40px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .chat-header .info h2 { color: #fff; font-size: 15px; font-weight: 600; }
    .chat-header .info p  { color: rgba(255,255,255,0.75); font-size: 12px; }

    .status-dot {
      width: 8px; height: 8px;
      background: #4ade80;
      border-radius: 50%;
      display: inline-block;
      margin-right: 5px;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: #f8f9fb;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 2px; }

    .message {
      display: flex;
      flex-direction: column;
      max-width: 80%;
      animation: fadeIn 0.2s ease-in;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

    .message.user  { align-self: flex-end; align-items: flex-end; }
    .message.bot   { align-self: flex-start; align-items: flex-start; }

    .bubble {
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.5;
    }

    .message.user .bubble {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .message.bot .bubble {
      background: #fff;
      color: #1f2937;
      border-bottom-left-radius: 4px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .timestamp {
      font-size: 10px;
      color: #9ca3af;
      margin-top: 3px;
    }

    .typing-bubble {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 12px 16px;
      background: #fff;
      border-radius: 16px;
      border-bottom-left-radius: 4px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .typing-bubble span {
      width: 7px; height: 7px;
      background: #9ca3af;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing-bubble span:nth-child(2) { animation-delay: 0.2s; }
    .typing-bubble span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

    .input-area {
      padding: 14px 16px;
      background: #fff;
      border-top: 1px solid #e5e7eb;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    #userInput {
      flex: 1;
      border: 1.5px solid #e5e7eb;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      outline: none;
      transition: border-color 0.2s;
      max-height: 100px;
    }

    #userInput:focus { border-color: #667eea; }

    #sendBtn {
      width: 42px; height: 42px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.2s, transform 0.1s;
      flex-shrink: 0;
    }

    #sendBtn:hover  { opacity: 0.88; }
    #sendBtn:active { transform: scale(0.95); }
    #sendBtn:disabled { opacity: 0.4; cursor: not-allowed; }

    #sendBtn svg { fill: #fff; }
  </style>
</head>
<body>

<div class="chat-container">
  <div class="chat-header">
    <div class="avatar">⛅</div>
    <div class="info">
      <h2>Weather Assistant</h2>
      <p><span class="status-dot"></span>Powered by Gemini AI</p>
    </div>
  </div>

  <div class="messages" id="messages">
    <div class="message bot">
      <div class="bubble">
        Hi! I'm your weather assistant. Ask me about the weather anywhere in the world — for example:<br><br>
        <em>"What's the weather in Tokyo?"</em><br>
        <em>"Is it raining in Mumbai right now?"</em>
      </div>
      <span class="timestamp">Just now</span>
    </div>
  </div>

  <div class="input-area">
    <textarea id="userInput" rows="1" placeholder="Ask about weather in any city..."></textarea>
    <button id="sendBtn" onclick="sendMessage()">
      <svg width="18" height="18" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
  // IMPORTANT: Replace this with your actual n8n webhook URL after activating the workflow
  const WEBHOOK_URL = "https://n8n.framegenai.cloud/webhook/weather-chat";

  const messagesEl = document.getElementById("messages");
  const inputEl    = document.getElementById("userInput");
  const sendBtn    = document.getElementById("sendBtn");

  function getTime() {
    return new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
  }

  function addMessage(text, role) {
    const div = document.createElement("div");
    div.className = `message ${role}`;
    div.innerHTML = `<div class="bubble">${text}</div><span class="timestamp">${getTime()}</span>`;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  function showTyping() {
    const div = document.createElement("div");
    div.className = "message bot";
    div.id = "typing";
    div.innerHTML = `<div class="typing-bubble"><span></span><span></span><span></span></div>`;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById("typing");
    if (el) el.remove();
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;

    inputEl.value = "";
    inputEl.style.height = "auto";
    sendBtn.disabled = true;

    addMessage(text, "user");
    showTyping();

    try {
      const res = await fetch(WEBHOOK_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text })
      });

      const data = await res.json();
      removeTyping();
      addMessage(data.reply || "Sorry, I couldn't get weather data right now.", "bot");
    } catch (err) {
      removeTyping();
      addMessage("Connection error. Make sure your n8n workflow is active and the webhook URL is correct.", "bot");
      console.error(err);
    } finally {
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }

  // Send on Enter (Shift+Enter for new line)
  inputEl.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  // Auto-resize textarea
  inputEl.addEventListener("input", () => {
    inputEl.style.height = "auto";
    inputEl.style.height = Math.min(inputEl.scrollHeight, 100) + "px";
  });
</script>

</body>
</html>
